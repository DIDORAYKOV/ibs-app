<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>
<body>
<h1>Тест</h1>
<input type="email" id="email" placeholder="имейл">
<button onclick="login()">Влез</button>
<p id="result"></p>
<script>
function login() {
  var email = document.getElementById("email").value;
  document.getElementById("result").textContent = "Влязъл си с: " + email;
}
</script>
</body>
</html>
